<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAS → NotebookLM 変換ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #0f1117; color: #e4e4e7;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .container {
    max-width: 520px; width: 90%; text-align: center;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  h1 span { color: #818cf8; }
  .subtitle { font-size: 13px; color: #71717a; margin-bottom: 40px; line-height: 1.6; }
  .steps { display: flex; flex-direction: column; gap: 16px; }

  .step {
    background: #1a1d27; border: 1px solid #2e3348; border-radius: 12px;
    padding: 20px; text-align: left;
  }
  .step-num {
    display: inline-block; width: 24px; height: 24px; border-radius: 50%;
    background: #6366f1; color: #fff; font-size: 12px; font-weight: 700;
    text-align: center; line-height: 24px; margin-right: 8px;
  }
  .step-title { font-size: 14px; font-weight: 600; display: inline; }
  .step-desc { font-size: 12px; color: #71717a; margin-top: 8px; }

  .btn {
    padding: 10px 24px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all 0.15s; margin-top: 12px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #818cf8; }
  .btn-green { background: #059669; color: #fff; }
  .btn-green:hover:not(:disabled) { background: #10b981; }

  .progress-area { margin-top: 12px; display: none; }
  .progress-track {
    width: 100%; height: 8px; background: #242836;
    border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #6366f1, #818cf8);
    border-radius: 4px; transition: width 0.3s; width: 0%;
  }
  .progress-text {
    font-size: 11px; color: #71717a; margin-top: 6px;
  }

  .result {
    margin-top: 12px; padding: 12px; background: #242836;
    border-radius: 8px; font-size: 12px; color: #a1a1aa;
    display: none; text-align: left; line-height: 1.6;
  }
  .result strong { color: #e4e4e7; }

  .warning {
    padding: 12px 20px; background: #451a03; color: #fbbf24;
    font-size: 13px; border-radius: 8px; margin-bottom: 20px; display: none;
  }
</style>
</head>
<body>

<div class="container">
  <h1>NAS <span>→</span> NotebookLM</h1>
  <p class="subtitle">
    NAS共有フォルダの中身をテキスト化して<br>
    NotebookLMにそのまま投入できるファイルを作ります
  </p>

  <div class="warning" id="warning">
    このブラウザは File System Access API に対応していません。<br>Chrome / Edge をお使いください。
  </div>

  <div class="steps">
    <!-- Step 1 -->
    <div class="step">
      <span class="step-num">1</span>
      <span class="step-title">フォルダを選ぶ</span>
      <div class="step-desc">NASの共有フォルダを選択してください</div>
      <button class="btn btn-primary" id="btnOpen">フォルダを選ぶ</button>
      <div class="progress-area" id="scanProgress">
        <div class="progress-track"><div class="progress-fill" id="scanFill"></div></div>
        <div class="progress-text" id="scanText">フォルダ構造を読み込み中...</div>
      </div>
      <div class="result" id="scanResult"></div>
    </div>

    <!-- Step 2 -->
    <div class="step">
      <span class="step-num">2</span>
      <span class="step-title">中身を読み込む</span>
      <div class="step-desc">Word・Excel・PDF等の中身をテキスト化します（時間がかかります）</div>
      <button class="btn btn-primary" id="btnIndex" disabled>中身を読み込む</button>
      <div class="progress-area" id="indexProgress">
        <div class="progress-track"><div class="progress-fill" id="indexFill"></div></div>
        <div class="progress-text" id="indexText">読み込み中...</div>
      </div>
      <div class="result" id="indexResult"></div>
    </div>

    <!-- Step 3 -->
    <div class="step">
      <span class="step-num">3</span>
      <span class="step-title">書き出す</span>
      <div class="step-desc">NotebookLMにドラッグ&ドロップで投入できるテキストファイル</div>
      <button class="btn btn-green" id="btnExport" disabled>NotebookLM用に書き出す</button>
      <div class="result" id="exportResult"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// NAS → NotebookLM 変換ツール（超シンプル版）
// ============================================================

if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

if (!('showDirectoryPicker' in window)) {
  document.getElementById('warning').style.display = 'block';
  document.getElementById('btnOpen').disabled = true;
}

// State
let flatFiles = [];      // { name, path, ext, size, lastModified, handle }
let contentMap = {};     // path -> extracted text
let folderCount = 0;
let rootName = '';

// ============================================================
// Step 1: Scan folder structure
// ============================================================

document.getElementById('btnOpen').addEventListener('click', async () => {
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
    rootName = dirHandle.name;

    // Reset
    flatFiles = [];
    contentMap = {};
    folderCount = 0;

    // Show progress
    const prog = document.getElementById('scanProgress');
    prog.style.display = 'block';
    document.getElementById('scanResult').style.display = 'none';
    document.getElementById('btnOpen').disabled = true;

    // Scan
    await scanDir(dirHandle, '');

    // Done
    prog.style.display = 'none';
    const res = document.getElementById('scanResult');
    res.style.display = 'block';
    res.innerHTML = `<strong>${folderCount}</strong> フォルダ、<strong>${flatFiles.length}</strong> ファイルを検出`;

    document.getElementById('btnOpen').disabled = false;
    document.getElementById('btnIndex').disabled = false;

  } catch (e) {
    if (e.name !== 'AbortError') console.error(e);
    document.getElementById('btnOpen').disabled = false;
  }
});

let scanFileCount = 0;

async function scanDir(dirHandle, parentPath) {
  const path = parentPath ? `${parentPath}/${dirHandle.name}` : dirHandle.name;
  folderCount++;

  try {
    for await (const entry of dirHandle.values()) {
      if (entry.name.startsWith('.')) continue;

      if (entry.kind === 'file') {
        try {
          const file = await entry.getFile();
          flatFiles.push({
            name: entry.name,
            path: `${path}/${entry.name}`,
            ext: getExt(entry.name),
            size: file.size,
            lastModified: file.lastModified,
            handle: entry,
          });
          scanFileCount++;
          if (scanFileCount % 30 === 0) {
            document.getElementById('scanText').textContent =
              `${folderCount} フォルダ、${flatFiles.length} ファイル...`;
            await new Promise(r => setTimeout(r, 0));
          }
        } catch (e) {}
      } else if (entry.kind === 'directory') {
        await scanDir(entry, path);
      }
    }
  } catch (e) {}
}

// ============================================================
// Step 2: Index file contents
// ============================================================

document.getElementById('btnIndex').addEventListener('click', async () => {
  const btn = document.getElementById('btnIndex');
  btn.disabled = true;
  btn.textContent = '読み込み中...';

  const prog = document.getElementById('indexProgress');
  prog.style.display = 'block';
  document.getElementById('indexResult').style.display = 'none';

  const indexable = flatFiles.filter(f => isIndexable(f.ext) && f.size < 10 * 1024 * 1024);
  const total = indexable.length;
  let done = 0;
  let success = 0;
  let errors = 0;

  for (const f of indexable) {
    try {
      const text = await extractText(f);
      if (text && !text.startsWith('[')) {
        contentMap[f.path] = text;
        success++;
      }
    } catch (e) {
      errors++;
    }

    done++;
    const pct = Math.round((done / total) * 100);
    document.getElementById('indexFill').style.width = pct + '%';
    document.getElementById('indexText').textContent =
      `${done}/${total} 件処理 (${success} 件成功)`;

    // Yield to UI
    if (done % 3 === 0) await new Promise(r => setTimeout(r, 10));
  }

  prog.style.display = 'none';
  const res = document.getElementById('indexResult');
  res.style.display = 'block';
  res.innerHTML = `<strong>${success}</strong> ファイルの中身を読み込み完了` +
    (errors > 0 ? `（${errors} 件エラー）` : '');

  btn.textContent = '読み込み完了';
  document.getElementById('btnExport').disabled = false;
});

// ============================================================
// Step 3: Export for NotebookLM
// ============================================================

document.getElementById('btnExport').addEventListener('click', () => {
  const MAX_CHARS = 200000;
  const MAX_PER_FILE = 5000;

  const header = `${'='.repeat(60)}
NAS共有フォルダ（${rootName}）— 構造と内容一覧
書き出し日時: ${new Date().toLocaleString('ja-JP')}
ファイル数: ${flatFiles.length}, うち ${Object.keys(contentMap).length} ファイルの内容を含む
${'='.repeat(60)}

`;

  let parts = [];
  let current = header;
  let partNum = 1;

  for (const f of flatFiles) {
    let block = `${'-'.repeat(40)}
ファイル: ${f.path}
種類: ${f.ext || '不明'}
サイズ: ${formatSize(f.size)}
最終更新: ${f.lastModified ? new Date(f.lastModified).toLocaleString('ja-JP') : '不明'}
`;
    const content = contentMap[f.path];
    if (content) {
      block += `\n【内容】\n${content.substring(0, MAX_PER_FILE)}`;
      if (content.length > MAX_PER_FILE) block += `\n... (全${content.length}文字中${MAX_PER_FILE}文字を収録)`;
      block += '\n';
    }
    block += '\n';

    if (current.length + block.length > MAX_CHARS) {
      parts.push(current);
      partNum++;
      current = `${'='.repeat(60)}\nNAS共有フォルダ（続き Part ${partNum}）\n${'='.repeat(60)}\n\n`;
    }
    current += block;
  }
  parts.push(current);

  // Download
  parts.forEach((content, i) => {
    const suffix = parts.length > 1 ? `_part${i + 1}` : '';
    const filename = `nas_for_notebooklm${suffix}.txt`;
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  const res = document.getElementById('exportResult');
  res.style.display = 'block';
  res.innerHTML = `<strong>${parts.length}</strong> ファイルを書き出しました。` +
    `<br>NotebookLMを開いて、ソースとしてドラッグ&ドロップしてください。`;
});

// ============================================================
// Text extraction
// ============================================================

function isIndexable(ext) {
  return ['txt','csv','md','json','xml','html','htm',
          'docx','xlsx','xls','pdf',
          'doc','ppt','pptx','rtf','log','ini','cfg','yaml','yml'].includes(ext);
}

async function extractText(fileInfo) {
  const file = await fileInfo.handle.getFile();
  const ext = fileInfo.ext;

  if (['txt','csv','md','json','xml','html','htm','log','ini','cfg','yaml','yml','rtf'].includes(ext)) {
    try { return (await file.text()).substring(0, 50000); } catch { return ''; }
  }

  if (ext === 'docx') {
    try {
      const buf = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer: buf });
      return result.value.substring(0, 50000);
    } catch { return ''; }
  }

  if (ext === 'xlsx' || ext === 'xls') {
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      let text = '';
      wb.SheetNames.forEach(name => {
        text += `[${name}]\n` + XLSX.utils.sheet_to_csv(wb.Sheets[name]) + '\n';
      });
      return text.substring(0, 50000);
    } catch { return ''; }
  }

  if (ext === 'pdf' && typeof pdfjsLib !== 'undefined') {
    try {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      let text = '';
      for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        text += tc.items.map(item => item.str).join(' ') + '\n';
      }
      return text.substring(0, 50000);
    } catch { return ''; }
  }

  if (ext === 'doc' || ext === 'ppt') {
    try {
      const buf = await file.arrayBuffer();
      return extractFromBinary(buf);
    } catch { return ''; }
  }

  if (ext === 'pptx') {
    try {
      const buf = await file.arrayBuffer();
      const raw = new TextDecoder('utf-8', { fatal: false }).decode(new Uint8Array(buf));
      const matches = raw.match(/<a:t[^>]*>([^<]+)<\/a:t>/g);
      if (matches) {
        return matches.map(m => m.replace(/<[^>]+>/g, '').trim()).filter(Boolean).join(' ').substring(0, 50000);
      }
      return '';
    } catch { return ''; }
  }

  return '';
}

function extractFromBinary(arrayBuffer) {
  const bytes = new Uint8Array(arrayBuffer);
  const chunks = [];
  try {
    const raw = new TextDecoder('utf-16le', { fatal: false }).decode(bytes);
    const matches = raw.match(/[\u0020-\u007E\u3000-\u9FFF\uFF00-\uFFEF]{3,}/g);
    if (matches) chunks.push(...matches);
  } catch {}
  try {
    const raw = new TextDecoder('shift_jis', { fatal: false }).decode(bytes);
    const matches = raw.match(/[\u0020-\u007E\u3000-\u9FFF\uFF00-\uFFEF]{4,}/g);
    if (matches) matches.forEach(m => {
      if (!chunks.some(c => c.includes(m) || m.includes(c))) chunks.push(m);
    });
  } catch {}
  return chunks.filter(c => {
    if (c.length < 3) return false;
    const r = (c.match(/[\u3040-\u9FFF\uFF00-\uFFEFa-zA-Z0-9]/g) || []).length / c.length;
    return r > 0.3;
  }).join(' ').substring(0, 50000);
}

// Helpers
function getExt(name) { const m = name.match(/\.([^.]+)$/); return m ? m[1].toLowerCase() : ''; }
function formatSize(b) {
  if (!b) return '-';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(1) + ' GB';
}
</script>
</body>
</html>
